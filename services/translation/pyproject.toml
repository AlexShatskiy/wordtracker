[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
]
ignore = [
  "E501", # line too long — handled by formatter
]

[tool.ruff.lint.isort]
known-first-party = ["config", "schemas", "translation_service", "router"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
